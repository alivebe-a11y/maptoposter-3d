services:
  maptoposter-3d:
    image: ghcr.io/alivebe-a11y/maptoposter-3d:latest
    container_name: maptoposter-3d
    ports:
      - "5026:5025"
    volumes:
      - ./posters:/app/posters
      - ./overlays_cache:/app/overlays_cache
      - ./badges:/app/badges
      - ./u2net:/root/.u2net
      - ./custom_themes:/app/custom_themes
      # Stadiums data — choose ONE of the two options below:
      # Option A: mount the specific JSON file directly
      #   - /path/to/stadiums.json:/app/stadiums.json
      # Option B: mount the folder and set STADIUMS_FILE env var below
      #   - /path/to/stadiums_folder:/app/stadiums_data
      # To use custom fonts, uncomment and place .ttf files in ./fonts/
      # - ./fonts:/app/fonts
    environment:
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
      # If using Option B above, set the path to the file inside the mounted folder:
      # - STADIUMS_FILE=/app/stadiums_data/stadiums.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

networks: {}
