services:
  maptoposter-3d:
    image: ghcr.io/alivebe-a11y/maptoposter-3d:latest
    container_name: maptoposter-3d
    ports:
      - "5026:5025"
    volumes:
      - ./posters:/app/posters
      - ./overlays_cache:/app/overlays_cache
      - ./badges:/app/badges
      - ./stadiums.json:/app/stadiums.json
      - ./fonts:/app/fonts
      - ./u2net:/root/.u2net
    environment:
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

networks: {}
