services:
  maptoposter-3d:
    image: ghcr.io/alivebe-a11y/maptoposter-3d:latest
    container_name: maptoposter-3d
    ports:
      - "5026:5025"
    volumes:
      - ./posters:/app/posters
      - ./overlays_cache:/app/overlays_cache
      - ./badges:/app/badges
      - ./u2net:/root/.u2net
      # To use custom fonts, uncomment and place .ttf files in ./fonts/
      # - ./fonts:/app/fonts
    environment:
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

networks: {}
