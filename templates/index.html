<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapToPoster 3D</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="app-header">
  <h1>MapToPoster 3D</h1>
  <span class="badge-3d">3D Landmarks</span>
</header>

<!-- ===================== APP BODY ===================== -->
<div class="app-body">

  <!-- ====== LEFT: Controls Panel ====== -->
  <aside class="controls-panel">

    <!-- Token Warning -->
    <div id="tokenWarning" class="token-warning">
      No Mapbox token detected. Set <code>MAPBOX_TOKEN</code> in your <code>.env</code> file for map capture.
    </div>

    <!-- Status Message -->
    <div id="statusMsg" class="status-msg"></div>

    <form id="posterForm">

      <!-- ---- Stadium ---- -->
      <div class="section-card">
        <div class="section-title">Stadium / Location</div>

        <div class="form-row">
          <label for="stadiumInput">Stadium Name</label>
          <div class="stadium-input-wrap">
            <input type="text" id="stadiumInput" name="stadium"
                   list="stadiumList" placeholder="Type or select a stadium..."
                   autocomplete="off" />
            <button type="button" class="stadium-clear-btn" id="stadiumClear" title="Clear">&#x2715;</button>
          </div>
          <datalist id="stadiumList">
            {% for s in stadiums %}
            <option value="{{ s.name }}">{{ s.team }} — {{ s.city }}, {{ s.country }}</option>
            {% endfor %}
          </datalist>
        </div>

        <div class="coord-display form-row">
          <div class="coord-field">
            <label for="lat">Latitude</label>
            <input type="number" id="lat" name="lat" step="0.00001"
                   placeholder="53.46308" value="" />
          </div>
          <div class="coord-field">
            <label for="lon">Longitude</label>
            <input type="number" id="lon" name="lon" step="0.00001"
                   placeholder="-2.29133" value="" />
          </div>
        </div>
      </div>

      <!-- ---- 3D View Controls ---- -->
      <div class="section-card">
        <div class="section-title">3D View</div>

        <!-- Lighting Preset -->
        <div class="form-row">
          <label>Lighting Preset</label>
          <div class="lighting-grid">
            <button type="button" class="lighting-btn" data-preset="dawn">
              <span class="icon">&#127751;</span>Dawn
            </button>
            <button type="button" class="lighting-btn" data-preset="day">
              <span class="icon">&#9728;&#65039;</span>Day
            </button>
            <button type="button" class="lighting-btn active" data-preset="dusk">
              <span class="icon">&#127752;</span>Dusk
            </button>
            <button type="button" class="lighting-btn" data-preset="night">
              <span class="icon">&#127763;</span>Night
            </button>
          </div>
        </div>

        <!-- Zoom -->
        <div class="slider-row">
          <div class="slider-label-row">
            <label for="zoomSlider">Zoom</label>
            <span class="slider-value" id="zoomSliderVal">16.5</span>
          </div>
          <input type="range" id="zoomSlider" min="14" max="19" step="0.1" value="16.5" />
        </div>

        <!-- Pitch -->
        <div class="slider-row">
          <div class="slider-label-row">
            <label for="pitchSlider">Pitch</label>
            <span class="slider-value" id="pitchSliderVal">55</span>
          </div>
          <input type="range" id="pitchSlider" min="0" max="85" step="1" value="55" />
        </div>

        <!-- Bearing -->
        <div class="slider-row">
          <div class="slider-label-row">
            <label for="bearingSlider">Bearing</label>
            <span class="slider-value" id="bearingSliderVal">0</span>
          </div>
          <input type="range" id="bearingSlider" min="-180" max="180" step="1" value="0" />
        </div>
      </div>

      <!-- ---- Themes ---- -->
      <div class="section-card">
        <div class="theme-select-header">
          <div class="section-title" style="margin-bottom:0">
            Themes &mdash; <span id="themeCount" style="color:var(--text-muted);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0">None selected</span>
          </div>
          <button type="button" class="btn-select-all" id="selectAllBtn">Select All</button>
        </div>
        <div class="divider" style="margin: 10px 0 10px;"></div>
        <div class="theme-list" id="themeList">
          <!-- Populated by script.js -->
        </div>
      </div>

      <!-- ---- Overlay ---- -->
      <div class="section-card">
        <div class="section-title">Overlay Options</div>

        <div class="form-row">
          <label>Overlay Size</label>
          <div class="size-btns">
            <button type="button" class="size-btn" data-size="small">Small</button>
            <button type="button" class="size-btn active" data-size="medium">Medium</button>
            <button type="button" class="size-btn" data-size="large">Large</button>
          </div>
        </div>

        <div class="form-row">
          <label for="badgeSelect">Badge / Crest</label>
          <select id="badgeSelect" name="badge">
            <option value="">No badge</option>
            {% for badge in badges %}
            <option value="{{ badge }}">{{ badge }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- ---- Actions ---- -->
      <div class="action-buttons">
        <button type="button" class="btn btn-preview" id="previewBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4l3 3"/>
          </svg>
          Preview 3D Map
        </button>
        <button type="submit" class="btn btn-primary" id="generateBtn">
          <div class="spinner"></div>
          <span class="btn-text">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
            Generate Poster
          </span>
        </button>
      </div>

    </form>
  </aside>

  <!-- ====== RIGHT: Result / Preview Panel ====== -->
  <main class="result-panel">
    <div class="preview-container">

      <!-- Placeholder shown before any action -->
      <div id="previewPlaceholder" class="preview-placeholder">
        <div class="preview-placeholder-icon">&#127968;</div>
        <p>Preview your 3D map or generate a poster</p>
      </div>

      <!-- Live map preview (hidden until Preview clicked) -->
      <div id="mapPreview" style="display:none;"></div>

      <!-- Poster result injected here -->
      <div id="resultContainer"></div>

    </div>
  </main>

</div><!-- /app-body -->

<!-- ===================== OFFSCREEN CAPTURE ===================== -->
<div id="captureContainer">
  <div id="captureMap"></div>
</div>

<!-- ===================== SCRIPTS ===================== -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.js"></script>
<script>
  window.MAPBOX_TOKEN = {{ mapbox_token | tojson }};
  window.STADIUMS     = {{ stadiums_json | safe }};
  window.THEMES       = {{ themes_json | safe }};
  window.THEME_KEYS   = {{ themes | tojson }};
</script>
<script src="/static/script.js"></script>

</body>
</html>
